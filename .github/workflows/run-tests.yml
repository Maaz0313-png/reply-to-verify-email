name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.4, 8.3]
        laravel: [12.*, 11.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 12.*
            testbench: 10.*
          - laravel: 11.*
            testbench: 9.*
          - laravel: dev-master
            testbench: 11.*
            php: 8.4
            os: ubuntu-latest
            stability: prefer-stable
          - laravel: 13.x-dev
            testbench: 11.*
            php: 8.4
            os: ubuntu-latest
            stability: prefer-stable
          - laravel: dev-master
            testbench: 11.*
            php: 8.4
            os: ubuntu-latest
            stability: prefer-stable
            skeleton: dev-master

    name: P${{ matrix.php }} - L${{ matrix.laravel }}${{ matrix.skeleton && format(' + SK:{0}', matrix.skeleton) || '' }} - ${{ matrix.stability }} - ${{ matrix.os }}

    continue-on-error: ${{ matrix.laravel == 'dev-master' || matrix.laravel == '13.x-dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}"${{ matrix.skeleton && format(' "laravel/laravel:{0}"', matrix.skeleton) || '' }} --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci
